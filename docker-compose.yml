version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER:-homeohealth}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      POSTGRES_DB: ${DATABASE_NAME:-homeohealth}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-homeohealth} -d ${DATABASE_NAME:-homeohealth}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${DATABASE_USER:-homeohealth}:${DATABASE_PASSWORD:-changeme}@db:5432/${DATABASE_NAME:-homeohealth}
      DATABASE_USER: ${DATABASE_USER:-homeohealth}
      DATABASE_HOST: db
      DATABASE_NAME: ${DATABASE_NAME:-homeohealth}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      DATABASE_PORT: 5432
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
